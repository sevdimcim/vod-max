name: YouTube M3U8 Guncelleme

on:
  schedule:
    - cron: '*/45 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Depoyu Klonla
        uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Gereksinimleri Yukle
        run: pip install requests urllib3

      - name: Scripti Calistir
        run: python YouTube.py

      - name: Degisiklikleri Kaydet ve Pushla
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add kemal-sunal-filmleri.m3u8
          git commit -m "M3U8 dosyasi guncellendi" || echo "Degisiklik yok"
          git push
          
